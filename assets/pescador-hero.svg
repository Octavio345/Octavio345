<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.5" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#071A2E"/>
    </linearGradient>

    <linearGradient id="accent" x1="105" y1="75" x2="1195" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="0.45" stop-color="#2F81F7"/>
      <stop offset="1" stop-color="#39D353"/>
    </linearGradient>

    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 125) rotate(30) scale(420 210)">
      <stop stop-color="#58A6FF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1095 382) rotate(18) scale(430 210)">
      <stop stop-color="#39D353" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#39D353" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#223149" stroke-width="1" opacity="0.45"/>
    </pattern>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .scan { animation: scan 5.4s ease-in-out infinite; }
      .dash { stroke-dasharray: 14 24; animation: dash 15s linear infinite; }
      .hook { animation: hook 3.2s ease-in-out infinite; transform-origin: 1010px 202px; }
      .float { animation: float 4.6s ease-in-out infinite; }
      .float2 { animation: float 5.4s ease-in-out infinite; animation-delay: .8s; }
      .pulse { animation: pulse 2.7s ease-in-out infinite; }
      .pulse2 { animation: pulse 2.7s ease-in-out infinite; animation-delay: 1.1s; }
      .typebar { animation: typebar 1.05s steps(2, end) infinite; }
      .wave { animation: wave 7s ease-in-out infinite; }
      .wave2 { animation: wave 8.6s ease-in-out infinite; animation-delay: .7s; }

      @keyframes scan {
        0%, 100% { transform: translateX(-220px); opacity: 0; }
        18%, 60% { opacity: .8; }
        78% { transform: translateX(1040px); opacity: 0; }
      }

      @keyframes dash {
        to { stroke-dashoffset: -540; }
      }

      @keyframes hook {
        0%, 100% { transform: rotate(-2deg) translateY(0); }
        50% { transform: rotate(3deg) translateY(8px); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes pulse {
        0%, 100% { opacity: .45; transform: scale(.96); }
        50% { opacity: 1; transform: scale(1.08); }
      }

      @keyframes typebar {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      @keyframes wave {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-24px); }
      }
    </style>
  </defs>

  <rect width="1400" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="520" rx="34" fill="url(#grid)" opacity=".75"/>
  <rect width="1400" height="520" rx="34" fill="url(#glowA)"/>
  <rect width="1400" height="520" rx="34" fill="url(#glowB)"/>

  <g class="scan">
    <rect x="68" y="40" width="230" height="440" rx="115" fill="#58A6FF" opacity=".10"/>
    <rect x="176" y="40" width="3" height="440" fill="#A5D6FF" opacity=".90"/>
  </g>

  <path class="dash" d="M70 395C225 300 340 388 485 272C632 155 792 292 944 172C1087 60 1230 103 1324 70" stroke="url(#accent)" stroke-width="2.2" opacity=".48"/>
  <path class="dash" d="M82 122C225 170 340 68 496 106C645 143 752 86 906 126C1065 167 1170 244 1320 202" stroke="#58A6FF" stroke-width="1.5" opacity=".25"/>

  <g transform="translate(84 82)">
    <rect x="0" y="0" width="68" height="68" rx="18" fill="#0D1117" stroke="#30363D"/>
    <path d="M22 47V21H34C41 21 46 25 46 31.5C46 38 41 42 34 42H28V47H22ZM28 36.5H34C37.5 36.5 40 34.6 40 31.5C40 28.4 37.5 26.5 34 26.5H28V36.5Z" fill="#58A6FF"/>
    <text x="92" y="25" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="4">PROFILE BUILD</text>
    <text x="92" y="101" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="1">OCTAVIO AUGUSTO</text>
    <text x="96" y="148" fill="#C9D1D9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="650">Pescador de solucoes digitais | Web | ML | IA Aplicada</text>
  </g>

  <g transform="translate(88 285)">
    <rect x="0" y="0" width="372" height="118" rx="22" fill="#0D1117" stroke="#30363D"/>
    <text x="28" y="43" fill="#58A6FF" font-family="JetBrains Mono, Consolas, monospace" font-size="20" font-weight="800">status: building real projects</text>
    <text x="28" y="77" fill="#C9D1D9" font-family="JetBrains Mono, Consolas, monospace" font-size="17">web + backend + computer vision</text>
    <rect class="typebar" x="28" y="94" width="14" height="22" rx="3" fill="#39D353"/>
  </g>

  <g transform="translate(512 286)">
    <rect x="0" y="0" width="186" height="118" rx="22" fill="#0D1117" stroke="#30363D"/>
    <text x="28" y="45" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">COMMITS</text>
    <text x="28" y="90" fill="#39D353" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="900">400+</text>
  </g>

  <g transform="translate(746 286)">
    <rect x="0" y="0" width="262" height="118" rx="22" fill="#0D1117" stroke="#30363D"/>
    <text x="28" y="44" fill="#8B949E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="2">AI TOOLKIT</text>
    <text x="28" y="78" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="850">ChatGPT + Claude</text>
  </g>

  <g class="hook" filter="url(#softGlow)">
    <path d="M1137 70C1107 104 1064 151 1018 203" stroke="#A5D6FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M1018 203C1004 219 1005 246 1026 256C1048 267 1071 249 1061 228" stroke="#58A6FF" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1018" cy="203" r="6" fill="#A5D6FF"/>
    <rect class="pulse" x="955" y="258" width="22" height="22" rx="6" fill="#39D353"/>
    <rect class="pulse2" x="987" y="284" width="18" height="18" rx="5" fill="#26A641"/>
    <rect class="pulse" x="1020" y="266" width="20" height="20" rx="6" fill="#58A6FF"/>
  </g>

  <g class="float" transform="translate(1130 265)">
    <rect x="0" y="0" width="176" height="74" rx="18" fill="#0D1117" stroke="#30363D"/>
    <text x="23" y="31" fill="#8B949E" font-family="JetBrains Mono, Consolas, monospace" font-size="13">nickname</text>
    <text x="23" y="56" fill="#58A6FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">Pescador</text>
  </g>

  <g class="float2" transform="translate(1112 362)">
    <rect x="0" y="0" width="196" height="58" rx="18" fill="#0D1117" stroke="#30363D"/>
    <text x="22" y="36" fill="#C9D1D9" font-family="JetBrains Mono, Consolas, monospace" font-size="15">catching commits</text>
  </g>

  <g class="wave" opacity=".55">
    <path d="M0 468C125 444 213 493 338 468C465 443 552 492 678 468C805 443 892 492 1019 468C1145 443 1234 492 1400 464V520H0V468Z" fill="#0A2A43"/>
  </g>
  <g class="wave2" opacity=".45">
    <path d="M0 488C132 464 217 511 350 488C482 465 566 512 700 488C832 465 916 512 1050 488C1182 465 1268 512 1400 486V520H0V488Z" fill="#071F34"/>
  </g>
</svg>
