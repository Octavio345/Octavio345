<svg width="1400" height="470" viewBox="0 0 1400 470" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070D"/>
      <stop offset=".55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#061D31"/>
    </linearGradient>

    <linearGradient id="line" x1="80" y1="75" x2="1240" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset=".5" stop-color="#2F81F7"/>
      <stop offset="1" stop-color="#39D353"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <symbol id="colA" viewBox="0 0 18 150">
      <rect class="c0" x="0" y="0" width="16" height="16" rx="4"/>
      <rect class="c1 b d2" x="0" y="22" width="16" height="16" rx="4"/>
      <rect class="c0" x="0" y="44" width="16" height="16" rx="4"/>
      <rect class="c2 b d6" x="0" y="66" width="16" height="16" rx="4"/>
      <rect class="c1" x="0" y="88" width="16" height="16" rx="4"/>
      <rect class="c3 b d10" x="0" y="110" width="16" height="16" rx="4"/>
      <rect class="c0" x="0" y="132" width="16" height="16" rx="4"/>
    </symbol>

    <symbol id="colB" viewBox="0 0 18 150">
      <rect class="c2 b d1" x="0" y="0" width="16" height="16" rx="4"/>
      <rect class="c3" x="0" y="22" width="16" height="16" rx="4"/>
      <rect class="c1" x="0" y="44" width="16" height="16" rx="4"/>
      <rect class="c0" x="0" y="66" width="16" height="16" rx="4"/>
      <rect class="c3 b d7" x="0" y="88" width="16" height="16" rx="4"/>
      <rect class="c4 b d12" x="0" y="110" width="16" height="16" rx="4"/>
      <rect class="c1" x="0" y="132" width="16" height="16" rx="4"/>
    </symbol>

    <symbol id="colC" viewBox="0 0 18 150">
      <rect class="c1" x="0" y="0" width="16" height="16" rx="4"/>
      <rect class="c0" x="0" y="22" width="16" height="16" rx="4"/>
      <rect class="c3 b d4" x="0" y="44" width="16" height="16" rx="4"/>
      <rect class="c2" x="0" y="66" width="16" height="16" rx="4"/>
      <rect class="c1" x="0" y="88" width="16" height="16" rx="4"/>
      <rect class="c2 b d9" x="0" y="110" width="16" height="16" rx="4"/>
      <rect class="c3" x="0" y="132" width="16" height="16" rx="4"/>
    </symbol>

    <symbol id="colD" viewBox="0 0 18 150">
      <rect class="c0" x="0" y="0" width="16" height="16" rx="4"/>
      <rect class="c2 b d3" x="0" y="22" width="16" height="16" rx="4"/>
      <rect class="c4 b d8" x="0" y="44" width="16" height="16" rx="4"/>
      <rect class="c2" x="0" y="66" width="16" height="16" rx="4"/>
      <rect class="c3" x="0" y="88" width="16" height="16" rx="4"/>
      <rect class="c1" x="0" y="110" width="16" height="16" rx="4"/>
      <rect class="c0" x="0" y="132" width="16" height="16" rx="4"/>
    </symbol>

    <symbol id="colE" viewBox="0 0 18 150">
      <rect class="c3 b d5" x="0" y="0" width="16" height="16" rx="4"/>
      <rect class="c2" x="0" y="22" width="16" height="16" rx="4"/>
      <rect class="c1" x="0" y="44" width="16" height="16" rx="4"/>
      <rect class="c0" x="0" y="66" width="16" height="16" rx="4"/>
      <rect class="c4 b d11" x="0" y="88" width="16" height="16" rx="4"/>
      <rect class="c3" x="0" y="110" width="16" height="16" rx="4"/>
      <rect class="c2 b d13" x="0" y="132" width="16" height="16" rx="4"/>
    </symbol>

    <style>
      .c0 { fill: #161B22; stroke: #222B36; stroke-width: 1; }
      .c1 { fill: #0E4429; }
      .c2 { fill: #006D32; }
      .c3 { fill: #26A641; }
      .c4 { fill: #39D353; filter: url(#glow); }
      .gridcol { animation: float 5s ease-in-out infinite; transform-origin: center; }
      .b { animation: blink 3.5s ease-in-out infinite; transform-origin: center; }
      .d1 { animation-delay: .1s; }
      .d2 { animation-delay: .25s; }
      .d3 { animation-delay: .4s; }
      .d4 { animation-delay: .55s; }
      .d5 { animation-delay: .7s; }
      .d6 { animation-delay: .85s; }
      .d7 { animation-delay: 1s; }
      .d8 { animation-delay: 1.15s; }
      .d9 { animation-delay: 1.3s; }
      .d10 { animation-delay: 1.45s; }
      .d11 { animation-delay: 1.6s; }
      .d12 { animation-delay: 1.75s; }
      .d13 { animation-delay: 1.9s; }
      .trace { stroke-dasharray: 18 24; animation: trace 18s linear infinite; }
      .hook { animation: hook 3.4s ease-in-out infinite; transform-origin: 1100px 168px; }
      .label { animation: label 4s ease-in-out infinite; }
      .scan { animation: scan 4.8s ease-in-out infinite; }

      @keyframes blink {
        0%, 100% { opacity: .48; transform: scale(.92); }
        50% { opacity: 1; transform: scale(1.08); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }

      @keyframes trace {
        to { stroke-dashoffset: -680; }
      }

      @keyframes hook {
        0%, 100% { transform: rotate(-2deg) translateY(0); }
        50% { transform: rotate(3deg) translateY(12px); }
      }

      @keyframes label {
        0%, 100% { opacity: .7; }
        50% { opacity: 1; }
      }

      @keyframes scan {
        0%, 100% { transform: translateX(-160px); opacity: 0; }
        25%, 65% { opacity: .75; }
        80% { transform: translateX(780px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1400" height="470" rx="32" fill="url(#bg)"/>
  <rect x="34" y="34" width="1332" height="402" rx="26" fill="#0D1117" opacity=".60" stroke="#30363D"/>

  <text x="74" y="83" fill="#F0F6FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="2">COMMIT OCEAN</text>
  <text x="74" y="113" fill="#8B949E" font-family="JetBrains Mono, Consolas, monospace" font-size="15">400+ commits | consistencia visual | evolucao tecnica</text>

  <g transform="translate(74 168)">
    <g class="scan">
      <rect x="0" y="-14" width="120" height="178" rx="60" fill="#58A6FF" opacity=".08"/>
      <rect x="58" y="-14" width="3" height="178" fill="#A5D6FF" opacity=".8"/>
    </g>

    <use class="gridcol d1" href="#colA" x="0" y="0"/>
    <use class="gridcol d2" href="#colB" x="25" y="0"/>
    <use class="gridcol d3" href="#colC" x="50" y="0"/>
    <use class="gridcol d4" href="#colD" x="75" y="0"/>
    <use class="gridcol d5" href="#colE" x="100" y="0"/>
    <use class="gridcol d6" href="#colB" x="125" y="0"/>
    <use class="gridcol d7" href="#colD" x="150" y="0"/>
    <use class="gridcol d8" href="#colA" x="175" y="0"/>
    <use class="gridcol d9" href="#colC" x="200" y="0"/>
    <use class="gridcol d10" href="#colE" x="225" y="0"/>
    <use class="gridcol d11" href="#colA" x="250" y="0"/>
    <use class="gridcol d12" href="#colD" x="275" y="0"/>
    <use class="gridcol d13" href="#colB" x="300" y="0"/>
    <use class="gridcol d1" href="#colE" x="325" y="0"/>
    <use class="gridcol d2" href="#colC" x="350" y="0"/>
    <use class="gridcol d3" href="#colB" x="375" y="0"/>
    <use class="gridcol d4" href="#colA" x="400" y="0"/>
    <use class="gridcol d5" href="#colD" x="425" y="0"/>
    <use class="gridcol d6" href="#colC" x="450" y="0"/>
    <use class="gridcol d7" href="#colE" x="475" y="0"/>
    <use class="gridcol d8" href="#colB" x="500" y="0"/>
    <use class="gridcol d9" href="#colD" x="525" y="0"/>
    <use class="gridcol d10" href="#colA" x="550" y="0"/>
    <use class="gridcol d11" href="#colC" x="575" y="0"/>
    <use class="gridcol d12" href="#colE" x="600" y="0"/>
    <use class="gridcol d13" href="#colA" x="625" y="0"/>
    <use class="gridcol d1" href="#colB" x="650" y="0"/>
    <use class="gridcol d2" href="#colD" x="675" y="0"/>
    <use class="gridcol d3" href="#colE" x="700" y="0"/>
    <use class="gridcol d4" href="#colC" x="725" y="0"/>
  </g>

  <path class="trace" d="M75 376C205 290 340 372 468 282C610 181 772 314 912 215C1048 119 1160 177 1292 102" stroke="url(#line)" stroke-width="2.6" opacity=".52"/>

  <g class="hook" filter="url(#glow)">
    <path d="M1236 92C1184 123 1136 152 1090 190" stroke="#A5D6FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M1090 190C1077 210 1080 238 1104 247C1128 256 1150 234 1138 212" stroke="#58A6FF" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1090" cy="190" r="7" fill="#A5D6FF"/>
    <rect x="1028" y="254" width="22" height="22" rx="6" fill="#39D353"/>
    <rect x="1062" y="284" width="18" height="18" rx="5" fill="#26A641"/>
    <rect x="1094" y="260" width="20" height="20" rx="6" fill="#58A6FF"/>
  </g>

  <g transform="translate(930 292)">
    <rect x="0" y="0" width="356" height="92" rx="20" fill="#05070D" stroke="#30363D"/>
    <text class="label" x="26" y="36" fill="#39D353" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">400+ commits pescados</text>
    <text x="26" y="65" fill="#C9D1D9" font-family="JetBrains Mono, Consolas, monospace" font-size="15">cada quadrado empurra a evolucao</text>
  </g>
</svg>
